services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: insamo-backend:prod
    container_name: insamo-backend-prod
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    environment:
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://app.insamo.id}
      APP_URL: ${APP_URL:-https://apiapp.insamo.id}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_DATABASE:-insamo_rw}
      DB_USER: ${DB_USERNAME:-insamo}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - insamo-prod-network
      - web
    volumes:
      - ./backend/uploads:/var/www/uploads
    depends_on:
      - db
      - redis

  redis:
    image: redis:alpine
    container_name: insamo-redis-prod
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    networks:
      - insamo-prod-network

  db:
    image: mysql:8.0
    container_name: insamo-db-prod
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-insamo_rw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-insamo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - dbdata-prod:/var/lib/mysql
    networks:
      - insamo-prod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://apiapp.insamo.id/api}
        VITE_WEATHER_API_KEY: ${VITE_WEATHER_API_KEY:-your_api_key_here}
    image: insamo-frontend:prod
    container_name: insamo-frontend-prod
    restart: unless-stopped
    networks:
      - web
    depends_on:
      - app

networks:
  insamo-prod-network:
    driver: bridge
  web:
    external: true

volumes:
  dbdata-prod:
    driver: local
