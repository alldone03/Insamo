services:
  app:
    build:
      context: ./backend_2
      dockerfile: Dockerfile.prod
    image: insamo-backend-v2:prod
    container_name: insamo-backend-v2-prod
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env
    environment:
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://app.insamo.id}
      APP_URL: ${APP_URL:-https://apiapp.insamo.id}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_DATABASE:-insamo_rw}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - web
    volumes:
      - backend_v2_uploads:/var/www/uploads
    depends_on:
      - db

  nginx-prod:
    image: nginx:alpine
    container_name: insamo-nginx-prod
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - web
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: insamo-db-prod
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-insamo_rw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USERNAME:-insamo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - dbdata-prod:/var/lib/mysql
    networks:
      - web

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://apiapp.insamo.id/api}
    image: insamo-frontend:prod
    container_name: insamo-frontend-prod
    restart: unless-stopped
    networks:
      - insamo-prod-network
      - web
    depends_on:
      - app

networks:
  insamo-prod-network:
    driver: bridge
  web:
    external: true

volumes:
  dbdata-prod:
    driver: local
  backend_v2_uploads:
    driver: local
