services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: insamo-backend
    container_name: insamo-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend_node_modules:/var/www/node_modules
      - backend_yarn:/var/www/.yarn
      - /var/www/.pnp.cjs
      - /var/www/.pnp.loader.mjs
    ports:
      - "3000:3000"
    environment:
      APP_NAME: Insamo_v2
      APP_ENV: local
      APP_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_DATABASE:-insamo_rw}
      DB_USER: ${DB_USERNAME:-insamo}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-secret_dev_key_here}
    networks:
      - insamo-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: insamo-db
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-insamo_rw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-insamo}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - insamo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: insamo-frontend
    container_name: insamo-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - insamo-network
    depends_on:
      - app

networks:
  insamo-network:
    driver: bridge

volumes:
  dbdata:
  backend_node_modules:
  backend_yarn:
