name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ~/Insamo
            git pull origin main

            # Setup environment file if not exists
            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            # docker compose down

            # Restart containers
            docker compose -f docker-compose.prod.yml up -d --build

            # Database migration (Backend 2 - Node.js)
            # docker compose -f docker-compose.prod.yml exec -T app yarn db:push
            
            # Restart Nginx Gateway (if it exists in the same context, otherwise handled by its own repo)
            docker restart nginx-gateway
            
