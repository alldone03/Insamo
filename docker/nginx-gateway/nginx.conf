events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ===============================
    # RATE LIMIT ZONE (GLOBAL)
    # ===============================
    limit_req_zone $binary_remote_addr zone=frontend_ip:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=backend_ip:10m rate=30r/s;

    limit_req_status 429;

    # ===============================
    # HTTP : ACME + REDIRECT
    # ===============================
    server {
        listen 80;
        server_name app.insamo.id apiapp.insamo.id cogniva.insamo.id;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===============================
    # HTTPS : app.insamo.id (FRONTEND)
    # ===============================
    server {
        listen 443 ssl;
        server_name app.insamo.id;

        ssl_certificate     /etc/letsencrypt/live/app.insamo.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.insamo.id/privkey.pem;

        error_page 429 = @frontend_rate_limited;

        location / {
            limit_req zone=frontend_ip burst=60 nodelay;

            proxy_pass http://insamo-frontend-prod:80;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location @frontend_rate_limited {
            add_header Content-Type text/plain;
            return 429 "Too many requests. Please slow down.\n";
        }
    }

    # ===============================
    # HTTPS : apiapp.insamo.id
    # ===============================
    server {
        listen 443 ssl;
        server_name apiapp.insamo.id;

        ssl_certificate     /etc/letsencrypt/live/apiapp.insamo.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/apiapp.insamo.id/privkey.pem;
        
        error_page 429 = @backend_rate_limited;
        
        location / {
            limit_req zone=backend_ip burst=60 nodelay;
            proxy_pass http://insamo-nginx-prod:80;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location @backend_rate_limited {
            add_header Content-Type text/plain;
            return 429 "Too many requests. Please slow down.\n";
        }
    }

    # ===============================
    # HTTPS : cogniva.insamo.id
    # ===============================
    server {
        listen 443 ssl;
        server_name cogniva.insamo.id;

        ssl_certificate     /etc/letsencrypt/live/cogniva.insamo.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cogniva.insamo.id/privkey.pem;

        location / {
            proxy_pass http://itsquizz-fe:80;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://itsquizz-be:5000;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10M;
        }
    }
}
